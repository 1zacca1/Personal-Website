<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — Zacarias Moreira</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">Zacarias Moreira</a>
      <ul>
        <li><a href="/">About</a></li>
        <li><a href="/projects.html">Projects</a></li>
        <li><a href="/library.html" class="active">Library</a></li>
        <li><a href="/blog.html">Blog</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1>Library</h1>
      <p class="tagline">Some books I've read</p>
    </section>

    <section>
      <div class="book-grid" id="books-container">
        <p class="loading">Loading books&hellip;</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Zacarias Moreira</p>
  </footer>

  <script>
    async function loadBooks() {
      const container = document.getElementById('books-container');
      try {
        const res = await fetch('/api/books');
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'text/xml');
        const allItems = Array.from(xml.querySelectorAll('item'));
        if (!allItems.length) throw new Error('no books');

        const schoolKeywords = [
          /\btextbook\b/i, /\bworkbook\b/i, /\bstudent\s+guide\b/i,
          /\bstudy\s+guide\b/i, /\blecture\s+notes\b/i,
          /\bcalculus\b/i, /\blinear\s+algebra\b/i,
          /\bdiscrete\s+mathematics\b/i, /\borganic\s+chemistry\b/i,
          /\bgeneral\s+chemistry\b/i, /\bmicrobiology\b/i,
          /\banatomy\b/i, /\bphysiology\b/i,
          /\b\d+(st|nd|rd|th)\s+edition\b/i,
        ];

        const excludedTitles = [
          /hillbilly\s+elegy/i,
          /wonderboy/i,
          /financial\s+statement\s+analysis/i,
          /48\s+laws\s+of\s+power/i,
          /how\s+to\s+win\s+at\s+the\s+sport\s+of\s+business/i,
          // Exclude digest/summary versions of books
          /\bsummary\b.*zero\s+to\s+one/i,
          /zero\s+to\s+one.*\bsummary\b/i,
          /\bdigest\b.*zero\s+to\s+one/i,
          /zero\s+to\s+one.*\bdigest\b/i,
          /fast\s*reads?.*zero\s+to\s+one/i,
          /zero\s+to\s+one.*fast\s*reads?/i,
        ];

        const filtered = allItems.filter(item => {
          const cover = item.querySelector('book_large_image_url')?.textContent || '';
          const title = item.querySelector('title')?.textContent || '';
          // Exclude books with no real cover image
          if (!cover || cover.includes('nophoto') || cover.includes('nocover') || cover.trim() === '') return false;
          // Exclude school/textbook titles
          if (schoolKeywords.some(re => re.test(title))) return false;
          // Exclude specific titles
          if (excludedTitles.some(re => re.test(title))) return false;
          return true;
        });

        if (!filtered.length) throw new Error('no books after filtering');

        container.innerHTML = filtered.map(item => {
          const title = item.querySelector('title')?.textContent || 'Untitled';
          const author = item.querySelector('author_name')?.textContent || '';
          const cover = item.querySelector('book_large_image_url')?.textContent || '';
          const link = item.querySelector('link')?.textContent || '#';
          return `
            <a href="${link}" target="_blank" rel="noopener" class="book-card">
              <img src="${cover}" alt="${title}" loading="lazy" />
              <div class="book-info">
                <h3>${title}</h3>
                ${author ? `<p>${author}</p>` : ''}
              </div>
            </a>`;
        }).join('');
      } catch (_) {
        container.innerHTML = `<p class="fallback">View my books on <a href="https://www.goodreads.com/user/show/145297564" target="_blank" rel="noopener">Goodreads &rarr;</a></p>`;
      }
    }

    loadBooks();
  </script>
</body>
</html>
